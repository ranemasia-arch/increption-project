<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cipher System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">

    <h2>Cipher System</h2>

    <textarea id="text" placeholder="Enter text"></textarea>

    <input id="otp" type="text" placeholder="Enter OTP Key">

    <select id="mode">
      <option value="encrypt">Encrypt</option>
      <option value="decrypt">Decrypt</option>
    </select>

    <button onclick="run()">⚡ Run</button>

    <button onclick="useLastCipher()">🔒 Use Last Cipher</button>

    <pre id="output"></pre>

  </div>

  <script src="script.js"></script>

</body>
</html>
